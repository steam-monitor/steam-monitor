name: Steam Monitor

on:
  schedule:
    # Check every 10 minutes to avoid GitHub cron delay
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: volume_data.db
          key: volume-db-${{ github.run_id }}
          restore-keys: |
            volume-db-

      - name: Check if should run (once per hour)
        id: check
        run: python3 -c "
from datetime import datetime, timezone
now = datetime.now(timezone.utc)
minute = now.minute
if minute < 10:
    print('should_run=true')
else:
    print(f'should_run=false (minute={minute})')
"

      - name: Run monitor
        if: steps.check.outputs.should_run == 'true'
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python run_once.py

      - name: Save database to cache
        if: steps.check.outputs.should_run == 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: volume_data.db
          key: volume-db-${{ github.run_id }}
