name: Steam 饰品监控

on:
  schedule:
    # 每10分钟检查一次，避免GitHub cron延迟
    - cron: '*/10 * * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 恢复数据库（从缓存）
        uses: actions/cache@v4
        with:
          path: volume_data.db
          key: volume-db-${{ github.run_id }}
          restore-keys: |
            volume-db-

      - name: 检查是否需要运行（每小时只运行一次）
        id: check
        run: |
          # 获取上一次成功运行的时间（从缓存文件判断）
          # 如果距离上次运行不到55分钟，跳过本次
          # 使用GitHub API检查上次运行时间
          LAST_RUN=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/runs?status=success&per_page=1" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if data.get('workflow_runs'):
              print(data['workflow_runs'][0]['created_at'])
          else:
              print('')
          " 2>/dev/null)
          
          if [ -n "$LAST_RUN" ]; then
            # 转换为时间戳
            LAST_TS=$(date -d "$LAST_RUN" +%s 2>/dev/null)
            NOW_TS=$(date +%s)
            DIFF=$((NOW_TS - LAST_TS))
            echo "上次运行: $LAST_RUN, 距今 ${DIFF} 秒"
            if [ "$DIFF" -lt 3300 ]; then
              echo "距离上次运行不到55分钟，跳过本次"
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      - name: 运行监控（单次采集）
        if: steps.check.outputs.should_run == 'true'
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python run_once.py

      - name: 保存数据库（到缓存）
        if: steps.check.outputs.should_run == 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: volume_data.db
          key: volume-db-${{ github.run_id }}
