name: Steam 饰品监控

on:
  schedule:
    # 每小时运行一次（UTC时间，UTC+8=北京时间，所以0-15点UTC = 8-23点北京）
    - cron: '0 * * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 恢复数据库（从缓存）
        uses: actions/cache@v4
        with:
          path: volume_data.db
          key: volume-db-${{ github.run_id }}
          restore-keys: |
            volume-db-

      - name: 运行监控（单次采集）
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python run_once.py

      - name: 保存数据库（到缓存）
        uses: actions/cache/save@v4
        if: always()
        with:
          path: volume_data.db
          key: volume-db-${{ github.run_id }}
